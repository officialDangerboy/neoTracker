<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoTrack — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#080b10;--s:#0d1117;--border:#1a2030;--accent:#00ff88;--red:#ff3a5c;--text:#e2e8f0;--muted:#4a5568;--card:#0d1117}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 30%,rgba(0,255,136,0.05) 0%,transparent 55%),radial-gradient(ellipse at 70% 70%,rgba(0,150,255,0.03) 0%,transparent 55%);pointer-events:none}

/* grid bg */
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,136,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

.container{width:100%;max-width:420px;position:relative;z-index:1;animation:up .5s ease both}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.logo{text-align:center;margin-bottom:2rem}
.logo-mark{font-size:2rem;font-weight:800;letter-spacing:-0.04em}
.logo-mark span{color:var(--accent)}
.logo-sub{font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.15em;margin-top:4px}

.card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}

/* tabs */
.tabs{display:flex;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:1rem;text-align:center;font-family:'Space Mono',monospace;font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;cursor:pointer;color:var(--muted);border:none;background:transparent;transition:color .2s,border-bottom .2s}
.tab.active{color:var(--accent);border-bottom:2px solid var(--accent);margin-bottom:-1px}

.form{display:none;padding:1.75rem;flex-direction:column;gap:1rem}
.form.active{display:flex}

.field{display:flex;flex-direction:column;gap:6px}
label{font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em}
input{background:#060a0f;border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:0.85rem;padding:.7rem .9rem;border-radius:5px;outline:none;transition:border-color .2s}
input:focus{border-color:var(--accent)}
input::placeholder{color:var(--muted)}

/* captcha row */
.captcha-row{display:flex;gap:10px;align-items:flex-end}
.captcha-img-wrap{position:relative;border:1px solid var(--border);border-radius:5px;overflow:hidden;flex-shrink:0;cursor:pointer}
.captcha-img-wrap img{display:block;width:160px;height:52px}
.captcha-reload{position:absolute;top:3px;right:3px;background:rgba(0,0,0,0.6);border:none;color:var(--accent);font-size:0.7rem;cursor:pointer;padding:2px 5px;border-radius:3px}
.captcha-input-wrap{flex:1}

.err{background:rgba(255,58,92,0.08);border:1px solid rgba(255,58,92,0.25);color:#ff6b82;font-family:'Space Mono',monospace;font-size:0.72rem;padding:.6rem .8rem;border-radius:4px;display:none;line-height:1.5}
.err.show{display:block}

.btn-submit{background:var(--accent);color:#000;border:none;font-family:'Space Mono',monospace;font-size:0.82rem;font-weight:700;padding:.8rem;border-radius:5px;cursor:pointer;text-transform:uppercase;letter-spacing:0.06em;transition:background .15s,transform .1s;margin-top:0.25rem}
.btn-submit:hover{background:#00e87a;transform:translateY(-1px)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}

.hint{font-size:0.72rem;color:var(--muted);text-align:center;line-height:1.5}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-mark">Geo<span>Track</span></div>
    <div class="logo-sub">Location Intelligence Platform</div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- LOGIN -->
    <form class="form active" id="loginForm" onsubmit="doLogin(event)">
      <div class="field"><label>Email</label><input type="email" id="lEmail" placeholder="you@example.com" required></div>
      <div class="field"><label>Password</label><input type="password" id="lPass" placeholder="••••••••" required></div>
      <div class="err" id="lErr"></div>
      <button class="btn-submit" id="lBtn">Login →</button>
    </form>

    <!-- SIGNUP -->
    <form class="form" id="signupForm" onsubmit="doSignup(event)">
      <div class="field"><label>Full Name</label><input type="text" id="sName" placeholder="Your name" required></div>
      <div class="field"><label>Email</label><input type="email" id="sEmail" placeholder="you@example.com" required></div>
      <div class="field"><label>Password</label><input type="password" id="sPass" placeholder="Min 6 characters" required></div>
      <div class="field"><label>Confirm Password</label><input type="password" id="sCPass" placeholder="Repeat password" required></div>

      <div class="field">
        <label>Captcha — solve the math</label>
        <div class="captcha-row">
          <div class="captcha-img-wrap" onclick="reloadCaptcha()" title="Click to refresh">
            <img id="captchaImg" src="" alt="captcha">
            <button type="button" class="captcha-reload" onclick="reloadCaptcha();event.stopPropagation()">↻</button>
          </div>
          <div class="captcha-input-wrap">
            <div class="field" style="height:100%">
              <label>Answer</label>
              <input type="number" id="captchaAns" placeholder="?" style="height:52px" required>
            </div>
          </div>
        </div>
      </div>

      <div class="err" id="sErr"></div>
      <button class="btn-submit" id="sBtn">Create Account →</button>
    </form>
  </div>
</div>

<script>
let captchaToken = '';

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
  document.querySelector(`.tab:nth-child(${tab==='login'?1:2})`).classList.add('active');
  document.getElementById(tab + (tab==='login'?'Form':'upForm')).classList.add('active');
  if (tab === 'signup') loadCaptcha();
}

// Fix tab references
document.querySelectorAll('.tab')[0].onclick = () => {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.form').forEach(f=>f.classList.remove('active'));
  document.querySelectorAll('.tab')[0].classList.add('active');
  document.getElementById('loginForm').classList.add('active');
};
document.querySelectorAll('.tab')[1].onclick = () => {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.form').forEach(f=>f.classList.remove('active'));
  document.querySelectorAll('.tab')[1].classList.add('active');
  document.getElementById('signupForm').classList.add('active');
  loadCaptcha();
};

async function loadCaptcha() {
  const res = await fetch('/api/captcha');
  captchaToken = res.headers.get('X-Captcha-Token');
  const blob = await res.blob();
  document.getElementById('captchaImg').src = URL.createObjectURL(blob);
  document.getElementById('captchaAns').value = '';
}

function reloadCaptcha() { loadCaptcha(); }

async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('lBtn');
  const errEl = document.getElementById('lErr');
  errEl.classList.remove('show');
  btn.disabled = true; btn.textContent = 'Logging in…';

  try {
    const res = await fetch('/api/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email: document.getElementById('lEmail').value, password: document.getElementById('lPass').value })
    });
    const data = await res.json();
    if (!data.ok) { errEl.textContent = data.error; errEl.classList.add('show'); }
    else window.location.href = '/dashboard';
  } catch(e) { errEl.textContent = 'Network error'; errEl.classList.add('show'); }
  btn.disabled = false; btn.textContent = 'Login →';
}

async function doSignup(e) {
  e.preventDefault();
  const btn = document.getElementById('sBtn');
  const errEl = document.getElementById('sErr');
  errEl.classList.remove('show');
  btn.disabled = true; btn.textContent = 'Creating account…';

  try {
    const res = await fetch('/api/signup', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        name: document.getElementById('sName').value,
        email: document.getElementById('sEmail').value,
        password: document.getElementById('sPass').value,
        confirmPassword: document.getElementById('sCPass').value,
        captchaToken, captchaAnswer: document.getElementById('captchaAns').value
      })
    });
    const data = await res.json();
    if (!data.ok) {
      errEl.textContent = data.error; errEl.classList.add('show');
      if (data.error.includes('aptcha') || data.error.includes('expired')) loadCaptcha();
    } else window.location.href = '/dashboard';
  } catch(e) { errEl.textContent = 'Network error'; errEl.classList.add('show'); }
  btn.disabled = false; btn.textContent = 'Create Account →';
}

// Check if already logged in
fetch('/api/me').then(r=>r.json()).then(d=>{ if(d.loggedIn) window.location.href='/dashboard'; });
</script>
</body>
</html>
