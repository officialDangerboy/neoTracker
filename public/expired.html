<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Expired</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f0f2f5;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.card{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08),0 8px 32px rgba(0,0,0,.06);width:100%;max-width:400px;padding:2.5rem;text-align:center}
.icon{font-size:3rem;margin-bottom:1.25rem;opacity:.7}
h1{font-size:1.2rem;font-weight:600;color:#111;margin-bottom:.5rem}
p{font-size:.85rem;color:#6b7280;line-height:1.6}
.bar{height:3px;background:linear-gradient(90deg,#ff3a5c,#ff8c5a);border-radius:0 0 8px 8px;position:absolute;top:0;left:0;right:0}
.card{position:relative;overflow:hidden}
</style>
</head>
<body>
<div class="card">
  <div class="bar"></div>
  <div class="icon">⏰</div>
  <h1>This link has expired</h1>
  <p>The tracking link you followed is no longer active.<br>It may have been created with a short expiration window.</p>
</div>
</body>
</html>
